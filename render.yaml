services:
  - type: worker
    name: projeto-ia-viagens-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PUBLIC_BACKEND_BASE
        sync: false
      - key: MINIAPP_URL
        sync: false
      - key: COST_ROTEIRO_COMMAND
        value: "1.00"
      - key: TEST_BYPASS_ENABLED
        value: "0"
